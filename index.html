    <script>
        // ============ 环境检测 ============
        const isWechat = /MicroMessenger/i.test(navigator.userAgent);
        const isMobile = /Mobile|Android|iPhone/i.test(navigator.userAgent);

        // 微信优化
        if (isWechat) {
            document.addEventListener('touchmove', function(e) {
                if (e.target.tagName !== 'INPUT') e.preventDefault();
            }, { passive: false });
            
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(e) {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) e.preventDefault();
                lastTouchEnd = now;
            }, false);
        }

        // ============ 画布初始化 ============
        const canvas = document.getElementById('solarCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const wrapper = document.querySelector('.canvas-wrapper');
            const size = Math.min(wrapper.clientWidth, wrapper.clientHeight);
            const dpr = window.devicePixelRatio || 1;
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            ctx.scale(dpr, dpr);
            draw();
        }

        // ============ 行星数据 ============
        const planets = [
            { name: '水星', color: '#8C7853', radius: 3.5, orbitRadius: 45, period: 88, symbol: '☿' },
            { name: '金星', color: '#FFC649', radius: 5, orbitRadius: 65, period: 225, symbol: '♀' },
            { name: '地球', color: '#6B93D6', radius: 5.5, orbitRadius: 90, period: 365, symbol: '♁' },
            { name: '火星', color: '#C1440E', radius: 4.5, orbitRadius: 120, period: 687, symbol: '♂' },
            { name: '木星', color: '#D8CA9D', radius: 14, orbitRadius: 170, period: 4333, symbol: '♃' },
            { name: '土星', color: '#FAD5A5', radius: 12, orbitRadius: 220, period: 10759, symbol: '♄' },
            { name: '天王星', color: '#4FD0E7', radius: 8, orbitRadius: 265, period: 30687, symbol: '♅' },
            { name: '海王星', color: '#4b70dd', radius: 8, orbitRadius: 305, period: 60190, symbol: '♆' }
        ];

        let currentTime = 0, isPlaying = false, animationId = null;
        let speedMultiplier = 1, lastTimestamp = 0;
        const maxDays = 3650;

        // ============ 绘制函数 ============
        function drawSun(cx, cy, scale) {
            const g = ctx.createRadialGradient(cx, cy, 3, cx, cy, 30*scale);
            g.addColorStop(0, '#FFF8DC');
            g.addColorStop(0.2, '#FFD700');
            g.addColorStop(0.5, '#FF8C00');
            g.addColorStop(0.8, 'rgba(255,140,0,0.3)');
            g.addColorStop(1, 'rgba(255,140,0,0)');
            ctx.beginPath(); ctx.arc(cx, cy, 30*scale, 0, Math.PI*2);
            ctx.fillStyle = g; ctx.fill();

            const sg = ctx.createRadialGradient(cx-3*scale, cy-3*scale, 0, cx, cy, 12*scale);
            sg.addColorStop(0, '#FFFFA0'); sg.addColorStop(0.5, '#FFD700'); sg.addColorStop(1, '#FF8C00');
            ctx.beginPath(); ctx.arc(cx, cy, 12*scale, 0, Math.PI*2);
            ctx.fillStyle = sg; ctx.fill();
        }

        function drawOrbit(cx, cy, r) {
            ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
            ctx.strokeStyle = 'rgba(100,150,255,0.12)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function lighten(c, p) {
            const n = parseInt(c.replace('#',''), 16);
            const a = Math.round(2.55*p);
            const R = Math.min(255, (n>>16)+a);
            const G = Math.min(255, ((n>>8)&0xFF)+a);
            const B = Math.min(255, (n&0xFF)+a);
            return '#' + (0x1000000+R*0x10000+G*0x100+B).toString(16).slice(1);
        }

        function darken(c, p) {
            const n = parseInt(c.replace('#',''), 16);
            const a = Math.round(2.55*p);
            const R = Math.max(0, (n>>16)-a);
            const G = Math.max(0, ((n>>8)&0xFF)-a);
            const B = Math.max(0, (n&0xFF)-a);
            return '#' + (0x1000000+R*0x10000+G*0x100+B).toString(16).slice(1);
        }

        function drawPlanet(p, a, cx, cy, scale) {
            const x = cx + Math.cos(a) * p.orbitRadius * scale;
            const y = cy + Math.sin(a) * p.orbitRadius * scale;
            const r = p.radius * scale;

            const gg = ctx.createRadialGradient(x, y, 0, x, y, r*2);
            gg.addColorStop(0, p.color); gg.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(x, y, r*2, 0, Math.PI*2);
            ctx.fillStyle = gg; ctx.globalAlpha = 0.25; ctx.fill(); ctx.globalAlpha = 1;

            const pg = ctx.createRadialGradient(x-r*0.3, y-r*0.3, 0, x, y, r);
            pg.addColorStop(0, lighten(p.color, 40));
            pg.addColorStop(0.5, p.color);
            pg.addColorStop(1, darken(p.color, 40));
            ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.fillStyle = pg; ctx.fill();

            if (p.name === '土星') {
                ctx.save();
                ctx.translate(x, y); ctx.rotate(a + Math.PI/6);
                ctx.beginPath(); ctx.ellipse(0, 0, r*2.2, r*0.5, 0, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(200,180,140,0.5)'; ctx.lineWidth = 2; ctx.stroke();
                ctx.restore();
            }
        }

        function mulberry32(a) {
            return function() {
                let t = a += 0x6D2B79F5;
                t = Math.imul(t ^ (t >>> 15), t | 1);
                t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            }
        }

        function drawStars(w, h) {
            let r = mulberry32(12345);
            for (let i = 0; i < 120; i++) {
                const x = r() * w, y = r() * h;
                const s = r() * 1.5 + 0.3, o = r() * 0.6 + 0.2;
                ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${o * (0.6 + 0.4*Math.sin(currentTime*0.05+i))})`;
                ctx.fill();
            }
        }

        function draw() {
            const dpr = window.devicePixelRatio || 1;
            const dw = canvas.width / dpr, dh = canvas.height / dpr;
            
            ctx.clearRect(0, 0, dw, dh);
            
            const bg = ctx.createLinearGradient(0, 0, 0, dh);
            bg.addColorStop(0, '#050510'); bg.addColorStop(0.5, '#0a0a2e'); bg.addColorStop(1, '#050518');
            ctx.fillStyle = bg; ctx.fillRect(0, 0, dw, dh);

            drawStars(dw, dh);

            const cx = dw / 2, cy = dh / 2;
            const scale = Math.min(dw, dh) / 750;

            if (document.getElementById('showOrbits').checked) {
                planets.forEach(p => drawOrbit(cx, cy, p.orbitRadius * scale));
            }

            drawSun(cx, cy, scale);
            planets.forEach(p => {
                const a = (currentTime / p.period) * 2 * Math.PI;
                drawPlanet(p, a, cx, cy, scale);
            });
        }

        function updateDisplay() {
            document.getElementById('dayValue').textContent = Math.floor(currentTime);
            document.getElementById('yearValue').textContent = (currentTime / 365.25).toFixed(1);
            document.getElementById('sliderPercent').textContent = 
                Math.floor((currentTime / maxDays) * 100) + '%';
        }

        function animate(ts) {
            if (!isPlaying) return;
            if (lastTimestamp) {
                currentTime += (ts - lastTimestamp) / 1000 * 8 * speedMultiplier;
                if (currentTime > maxDays) currentTime = 0;
                timeSlider.value = currentTime;
                updateDisplay();
                draw();
            }
            lastTimestamp = ts;
            animationId = requestAnimationFrame(animate);
        }

        // ============ 事件绑定 ============
        const timeSlider = document.getElementById('timeSlider');
        
        timeSlider.addEventListener('input', (e) => {
            currentTime = parseFloat(e.target.value);
            updateDisplay(); draw();
            if (isPlaying) lastTimestamp = 0;
        });

        document.getElementById('playBtn').addEventListener('click', () => {
            if (!isPlaying) {
                isPlaying = true; lastTimestamp = 0;
                animationId = requestAnimationFrame(animate);
            }
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            isPlaying = false; lastTimestamp = 0;
            if (animationId) cancelAnimationFrame(animationId);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            isPlaying = false; lastTimestamp = 0;
            if (animationId) cancelAnimationFrame(animationId);
            currentTime = 0; timeSlider.value = 0;
            updateDisplay(); draw();
        });

        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                speedMultiplier = parseFloat(btn.dataset.speed);
            });
        });

        document.getElementById('showOrbits').addEventListener('change', draw);
        document.getElementById('showLabels').addEventListener('change', draw);

        // 图例
        const lt = document.getElementById('legendToggle');
        const lp = document.getElementById('legendPanel');
        lt.addEventListener('click', () => lp.classList.toggle('show'));
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.legend-toggle') && !e.target.closest('.legend-panel')) {
                lp.classList.remove('show');
            }
        });

        // 分享
        document.getElementById('shareBtn').addEventListener('click', () => {
            if (isWechat) {
                const tip = document.getElementById('shareTip');
                tip.style.display = 'block';
                setTimeout(() => tip.style.display = 'none', 3000);
            } else {
                document.getElementById('pageUrl').textContent = window.location.href;
                document.getElementById('shareModal').style.display = 'flex';
            }
        });

        function closeModal() {
            document.getElementById('shareModal').style.display = 'none';
        }
        document.getElementById('shareModal').addEventListener('click', (e) => {
            if (e.target.id === 'shareModal') closeModal();
        });

        // 横屏检测
        function checkOrientation() {
            const tip = document.getElementById('orientationTip');
            tip.style.display = (window.innerWidth < window.innerHeight && window.innerWidth < 500) ? 'flex' : 'none';
        }

        window.addEventListener('resize', () => { resizeCanvas(); checkOrientation(); });
        window.addEventListener('orientationchange', () => {
            setTimeout(() => { resizeCanvas(); checkOrientation(); }, 100);
        });

        // 页面可见性
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isPlaying) document.getElementById('pauseBtn').click();
        });

        // 初始化
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                resizeCanvas();
                updateDisplay();
                checkOrientation();
                draw();
            }, 500);
        });
    </script>
</body>
</html>
